<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Form</title>
        <style>
        body { 
            background-color: rgb(154, 97, 97);
            height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        form {
            background-color: rgb(92, 27, 27);
            height: 350px;
            width: 300px;

            border-radius: 20px;
            border: 2px solid white;
            box-shadow: 5px 5px 10px black;

            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            
        }
        div {
            width: 90%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }
        label {
            color: rgb(245, 210, 210);
        }
        input[type="submit"] {
            width: 50%;
            height: 30px;
            background-color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: black;
            color: white;
            border-radius: 25px;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 60%;
            height: 15px;
            border-radius: 5px;
            border: none;
            padding: 5px;
        }
        form span:not(:last-of-type) {
            align-self: flex-start;
            color: rgb(249, 73, 73);
            font-size: 12px;
        }
        #agreementBox {
            display: flex;
            align-items: center;
        }

        </style>
    </head>
    <Body>
        <h1>My Form</h1>
        <form novalidate action="submit.html" method="post" >
            <div id="nameBox">
                <label for="name">name:</label>
                <input type="text" id="name" name="name">
            </div>
            <span id = "nameError"></span>
            <div id="emailBox">
                <label for="email">email:</label>
                <input type="email" id="email" name="email">
            </div>
            <span id = "emailError"></span>
            <div id="passwordBox">
                <label for="password">password:</label> 
                <input type="password" id="password" name="password">
            </div>
            <span id = "passwordError"></span>
            <div id="agreementBox">
                <label for="Tservice">I agree to the terms and services:</label>
                <input type="checkbox" id="Tservice" name="Tservice" value="Tservice">
            </div>
            <span id = "agreementError"></span>
            <input type="submit" value="Submit">
            <span id = "submitState"></span>
        </form>
        <script>
            // form validation
            function validateForm() {
                // 1) clear previous error messages
                document.getElementById("nameError").textContent = "";    
                document.getElementById("emailError").textContent = "";
                document.getElementById("passwordError").textContent = "";
                document.getElementById("agreementError").textContent = "";
                document.getElementById("submitState").textContent = "";

                // 2) get form values
                const name = document.getElementById("name").value.trim();
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value;
                const agreement = document.getElementById("Tservice").checked;

                let valid = true;

                if (name === "" || name.length < 3) {
                    document.getElementById("nameError").textContent = "⚠️: Name must contain at least 3 characters";
                    valid = false;
                }
                if (email === "" || !email.includes("@") || !email.includes(".")) {
                    document.getElementById("emailError").textContent = "⚠️: Email must include @ and . characters";
                    valid = false;
                }
                if (password === ""|| password.length < 8 || !/\d/.test(password)) {
                    document.getElementById("passwordError").textContent = "⚠️: Password must be at least 8 characters long and contain at least one number";
                    valid = false;
                }
                if (!agreement) {
                    document.getElementById("agreementError").textContent = "⚠️: You must agree to the terms and services";
                    valid = false;
                }

                if (valid) {
                    document.getElementById("submitState").textContent = "Form submitted successfully!🥳";
                    document.querySelector("form").reset();
                }
            } 

            // add event listener to the form submit button
            document.querySelector("form").addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault(); 
                }
            });
            document.querySelector("form").addEventListener("submit", function(event) {
                // prevent the default form submission behavior
                event.preventDefault(); 
                validateForm(); 
            });
        </script>
    </Body>
</html>
